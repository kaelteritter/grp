<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GraphSocial - Профиль</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components/header.css">
    <link rel="stylesheet" href="/css/components/modal.css">
    <link rel="stylesheet" href="/css/components/form.css">
    <link rel="stylesheet" href="/css/components/loading.css">
    <link rel="stylesheet" href="/css/pages/profile.css">
    <link rel="stylesheet" href="/css/components/slideshow.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    
</head>
<body class="profile-page">
    <div class="app">
        <header class="header">
            <div class="container">
                <a href="/profiles" class="btn back-btn">← Назад</a>
                <h1 class="logo">GraphSocial</h1>
                <div>
                    <button id="editProfileBtn" class="btn btn-secondary">✏️ Редактировать</button>
                    <button id="deleteProfileBtn" class="btn btn-danger" style="background: #ff3040;">🗑️ Удалить</button>
                </div>
            </div>
        </header>
        <button id="addPhotoBtn" class="add-photo-btn" title="Добавить фото">+</button>

        <main>
            <div class="profile-container">
                <div class="profile-header-compact">
                    <div class="profile-avatar-large" data-avatar-click>
                        <div id="profileAvatar"></div>
                    </div>
                    <div class="profile-info-compact">
                        <h1 id="profileName" class="profile-name-large"></h1>
                        <div class="profile-details-compact">
                            <span id="profileGender"></span>
                            <span id="profileBirthDate"></span>
                            <span id="profileLocation"></span>
                        </div>
                        <div class="profile-stats">
                            <div class="stat">
                                <div id="photosCount" class="stat-value">0</div>
                                <div class="stat-label">фото</div>
                            </div>
                            <div class="stat">
                                <div id="linksCount" class="stat-value">0</div>
                                <div class="stat-label">ссылки</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-sections">
                    <div class="info-section">
                        <h3><i class="fas fa-link"></i> Социальные сети</h3>
                        <div id="socialLinksList" class="social-links-section"></div>
                    </div>

                    <div class="info-section">
                        <h3><i class="fas fa-images"></i> Фотографии</h3>
                        <div id="photosGrid" class="photos-grid"></div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Profile Modal -->
        <div id="profileModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Редактировать профиль</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="firstName">Имя</label>
                            <input type="text" id="firstName" name="firstName" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label for="middleName">Отчество</label>
                            <input type="text" id="middleName" name="middleName" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Фамилия</label>
                            <input type="text" id="lastName" name="lastName" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label for="sex">Пол</label>
                            <select id="sex" name="sex">
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="birthYear">Год рождения</label>
                                <input type="number" id="birthYear" min="1900" max="2026">
                            </div>
                            <div class="form-group">
                                <label for="birthMonth">Месяц</label>
                                <input type="number" id="birthMonth" min="1" max="12">
                            </div>
                            <div class="form-group">
                                <label for="birthDay">День</label>
                                <input type="number" id="birthDay" min="1" max="31">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="locationSelect">Локация</label>
                            <select id="locationSelect" class="location-select">
                                <option value="">Не указано</option>
                            </select>
                        </div>
                        <div id="linksContainer"></div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Photo Upload Modal -->
        <div id="photoUploadModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Добавить фотографии</h2>
                    <button class="close-btn" id="photoUploadClose">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="photoUploadForm">
                        <div class="form-group">
                            <label for="photoFiles">Выберите фотографии</label>
                            <input type="file" id="photoFiles" multiple accept="image/*" required>
                            <small style="color: #8e8e8e; display: block; margin-top: 5px;">Можно выбрать несколько файлов</small>
                        </div>
                        <div id="photoPreview" class="photo-preview-grid"></div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="photoUploadCancel">Отмена</button>
                            <button type="button" class="btn btn-primary" id="photoUploadSubmit">Загрузить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Slideshow Modal -->
        <div id="slideshowModal" class="slideshow-modal hidden">
            <div class="slideshow-container">
                <button class="slideshow-close" id="slideshowClose">&times;</button>
                <button class="slideshow-nav slideshow-prev" id="slideshowPrev">❮</button>
                <button class="slideshow-nav slideshow-next" id="slideshowNext">❯</button>
                <div class="slideshow-images" id="slideshowImages"></div>
                <div class="slideshow-sidebar" id="slideshowAuthor"></div>
                <div class="slideshow-counter" id="slideshowCounter">1 / 1</div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/components/Toast.js"></script>
    <script src="/js/components/Loading.js"></script>
    <script src="/js/components/Modal.js"></script>
    <script src="/js/pages/profile.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
