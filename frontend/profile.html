<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GraphSocial - Профиль</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components/header.css">
    <link rel="stylesheet" href="/css/components/modal.css">
    <link rel="stylesheet" href="/css/components/form.css">
    <link rel="stylesheet" href="/css/components/loading.css">
    <link rel="stylesheet" href="/css/pages/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
</head>
<body class="profile-page">
    <div class="app">
        <header class="header">
            <div class="container">
                <a href="/profiles" class="btn back-btn">← Назад</a>
                <h1 class="logo">GraphSocial</h1>
                <div>
                    <button id="editProfileBtn" class="btn btn-secondary">✏️ Редактировать</button>
                    <button id="deleteProfileBtn" class="btn btn-danger" style="background: #ff3040;">🗑️ Удалить</button>
                </div>
            </div>
        </header>

        <main>
            <div class="profile-header">
                <div id="profileAvatar" class="profile-avatar-large"></div>
                <h1 id="profileName" class="profile-name-large"></h1>
                <div class="profile-stats">
                    <div class="stat">
                        <div id="photosCount" class="stat-value">0</div>
                        <div class="stat-label">фото</div>
                    </div>
                    <div class="stat">
                        <div id="linksCount" class="stat-value">0</div>
                        <div class="stat-label">ссылки</div>
                    </div>
                </div>
            </div>

            <div class="profile-content">
                <div class="info-section">
                    <h3>Основная информация</h3>
                    <div class="info-row">
                        <div class="info-label">ФИО</div>
                        <div id="profileFullName" class="info-value"></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Пол</div>
                        <div id="profileGender" class="info-value"></div>
                    </div>
                    <div id="birthDateRow" class="info-row">
                        <div class="info-label">Дата рождения</div>
                        <div id="profileBirthDate" class="info-value"></div>
                    </div>
                </div>

                <div id="locationSection" class="info-section">
                    <h3>Местоположение</h3>
                    <div id="profileLocation" class="info-row">
                        <div class="info-label">Локация</div>
                        <div class="info-value"></div>
                    </div>
                    <div id="profileRegion" class="info-row">
                        <div class="info-label">Регион</div>
                        <div class="info-value"></div>
                    </div>
                    <div id="profileCountry" class="info-row">
                        <div class="info-label">Страна</div>
                        <div class="info-value"></div>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Социальные сети</h3>
                    <div id="socialLinksList" class="social-links-section"></div>
                </div>

                <div class="info-section">
                    <h3>Фотографии</h3>
                    <div id="photosGrid" class="photos-grid"></div>
                </div>
            </div>
        </main>

        <!-- Profile Modal -->
        <div id="profileModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Редактировать профиль</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="firstName">Имя</label>
                            <input type="text" id="firstName" name="firstName" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label for="middleName">Отчество</label>
                            <input type="text" id="middleName" name="middleName" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Фамилия</label>
                            <input type="text" id="lastName" name="lastName" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label for="sex">Пол</label>
                            <select id="sex" name="sex">
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="birthYear">Год рождения</label>
                                <input type="number" id="birthYear" min="1900" max="2026">
                            </div>
                            <div class="form-group">
                                <label for="birthMonth">Месяц</label>
                                <input type="number" id="birthMonth" min="1" max="12">
                            </div>
                            <div class="form-group">
                                <label for="birthDay">День</label>
                                <input type="number" id="birthDay" min="1" max="31">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="locationSelect">Локация</label>
                            <select id="locationSelect" class="location-select">
                                <option value="">Не указано</option>
                            </select>
                        </div>
                        <div id="linksContainer"></div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/components/Toast.js"></script>
    <script src="/js/components/Loading.js"></script>
    <script src="/js/components/Modal.js"></script>
    <script src="/js/pages/profile.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
